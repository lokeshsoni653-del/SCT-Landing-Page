<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCT Admin Submission Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-navy: #1a237e;
      --color-navy-light: #283593;
      --color-gold: #f5c518;
      --color-gold-dark: #d4a017;
      --color-bg: #f8fafc;
      --color-card: #ffffff;
      --color-text: #1e293b;
      --color-text-muted: #64748b;
      --color-border: #cbd5e1;
      --color-red: #ef4444;
      --color-green: #22c55e;
      --font-family: 'Poppins', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-family);
      background-color: var(--color-bg);
      color: var(--color-text);
      line-height: 1.5;
      padding: 30px 15px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    /* Header styling */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--color-navy);
      padding: 20px 30px;
      border-radius: 12px;
      color: white;
      box-shadow: 0 10px 25px rgba(26, 35, 126, 0.15);
      margin-bottom: 30px;
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .logo-badge {
      width: 40px;
      height: 40px;
      background: var(--color-gold);
      color: var(--color-navy);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 20px;
    }

    .logo-text h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .logo-text span {
      font-size: 11px;
      color: var(--color-gold);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 500;
      display: block;
      margin-top: -2px;
    }

    .stats-summary {
      display: flex;
      gap: 20px;
    }

    .stat-badge {
      background: rgba(255, 255, 255, 0.1);
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .stat-badge span {
      color: var(--color-gold);
      font-weight: 700;
    }

    /* Controls Panel */
    .controls-panel {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 15px;
    }

    /* Tab switcher */
    .tabs {
      display: flex;
      background: #e2e8f0;
      padding: 5px;
      border-radius: 8px;
      gap: 5px;
    }

    .tab-btn {
      padding: 8px 20px;
      border: none;
      background: none;
      font-family: var(--font-family);
      font-size: 14px;
      font-weight: 600;
      color: var(--color-text-muted);
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tab-btn.active {
      background: var(--color-navy);
      color: white;
      box-shadow: 0 4px 10px rgba(26, 35, 126, 0.15);
    }

    .tab-count {
      font-size: 11px;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      padding: 2px 6px;
      border-radius: 10px;
    }

    .tab-btn:not(.active) .tab-count {
      background: #cbd5e1;
      color: var(--color-text-muted);
    }

    /* Action buttons */
    .actions {
      display: flex;
      gap: 10px;
    }

    .btn {
      padding: 10px 20px;
      border-radius: 8px;
      font-family: var(--font-family);
      font-size: 13.5px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s ease;
      border: none;
    }

    .btn-refresh {
      background: #e2e8f0;
      color: var(--color-text);
    }

    .btn-refresh:hover {
      background: #cbd5e1;
    }

    .btn-csv {
      background: var(--color-gold);
      color: var(--color-navy);
    }

    .btn-csv:hover {
      background: var(--color-gold-dark);
      transform: translateY(-1px);
    }

    /* Data Card Table Container */
    .data-card {
      background: var(--color-card);
      border-radius: 12px;
      border: 1px solid var(--color-border);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
      overflow: hidden;
      min-height: 300px;
      position: relative;
    }

    .table-responsive {
      overflow-x: auto;
      width: 100%;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }

    th {
      background: #f1f5f9;
      color: var(--color-navy);
      font-weight: 600;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 15px 20px;
      border-bottom: 2px solid var(--color-border);
    }

    td {
      padding: 16px 20px;
      font-size: 13.5px;
      border-bottom: 1px solid var(--color-border);
      vertical-align: top;
      word-break: break-word;
    }

    tr:hover td {
      background: #f8fafc;
    }

    .row-department {
      display: inline-block;
      padding: 3px 8px;
      background: rgba(26, 35, 126, 0.06);
      color: var(--color-navy);
      border: 1px solid rgba(26, 35, 126, 0.12);
      border-radius: 15px;
      font-size: 11px;
      font-weight: 600;
    }

    .row-date {
      color: var(--color-text-muted);
      font-size: 12px;
    }

    .row-message {
      max-width: 400px;
      color: var(--color-text);
      white-space: pre-wrap;
    }

    .btn-delete {
      color: var(--color-red);
      background: rgba(239, 68, 68, 0.07);
      border: 1px solid rgba(239, 68, 68, 0.15);
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-delete:hover {
      background: var(--color-red);
      color: white;
      box-shadow: 0 4px 10px rgba(239, 68, 68, 0.2);
    }

    /* Loader */
    .loader-container {
      display: none;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.8);
      z-index: 10;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 15px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(26, 35, 126, 0.1);
      border-top-color: var(--color-navy);
      border-radius: 50%;
      animation: spin 1s infinite linear;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Empty state */
    .empty-state {
      display: none;
      text-align: center;
      padding: 60px 20px;
      color: var(--color-text-muted);
    }

    .empty-state svg {
      width: 60px;
      height: 60px;
      stroke: #cbd5e1;
      margin-bottom: 15px;
    }

    .empty-state h3 {
      font-size: 16px;
      font-weight: 600;
      color: var(--color-text);
      margin-bottom: 5px;
    }

    /* Toast alert banner */
    .toast {
      position: fixed;
      bottom: 25px;
      right: 25px;
      background: #1e293b;
      color: white;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 13.5px;
      font-weight: 500;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
      z-index: 1000;
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    .toast-success {
      border-left: 4px solid var(--color-green);
    }

    .toast-error {
      border-left: 4px solid var(--color-red);
    }
  </style>
</head>
<body>

  <div class="container">
    
    <!-- ==================== HEADER ==================== -->
    <header>
      <div class="logo-container">
        <div class="logo-badge">S</div>
        <div class="logo-text">
          <h1>Students Club Tharparkar</h1>
          <span>Admin Data Portal</span>
        </div>
      </div>
      <div class="stats-summary">
        <div class="stat-badge">Inquiries: <span id="stat-inquiries-count">0</span></div>
        <div class="stat-badge">Messages: <span id="stat-contacts-count">0</span></div>
      </div>
    </header>

    <!-- ==================== CONTROLS PANEL ==================== -->
    <div class="controls-panel">
      <div class="tabs">
        <button class="tab-btn active" id="tab-inquiries" onclick="switchTab('inquiries')">
          Internship Inquiries
          <span class="tab-count" id="badge-inquiries">0</span>
        </button>
        <button class="tab-btn" id="tab-contacts" onclick="switchTab('contacts')">
          Contact Messages
          <span class="tab-count" id="badge-contacts">0</span>
        </button>
      </div>
      <div class="actions">
        <button class="btn btn-refresh" onclick="loadData()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/></svg>
          Refresh Data
        </button>
        <button class="btn btn-csv" onclick="exportCSV()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
          Export CSV
        </button>
      </div>
    </div>

    <!-- ==================== DATA LISTING CARD ==================== -->
    <div class="data-card">
      
      <!-- Spinner loader -->
      <div class="loader-container" id="loader">
        <div class="spinner"></div>
        <p style="color: var(--color-navy); font-weight: 500; font-size: 13.5px;">Loading submissions...</p>
      </div>

      <!-- Empty state -->
      <div class="empty-state" id="empty-view">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
          <line x1="9" y1="9" x2="15" y2="9"/>
          <line x1="9" y1="13" x2="15" y2="13"/>
          <line x1="9" y1="17" x2="15" y2="17"/>
        </svg>
        <h3>No entries found</h3>
        <p style="font-size: 13px;">Submissions will show up here once students interact with the website forms.</p>
      </div>

      <!-- Table View -->
      <div class="table-responsive" id="table-view">
        <table id="data-table">
          <!-- Dynamically populated via JS -->
        </table>
      </div>

    </div>

  </div>

  <!-- Toast popup -->
  <div class="toast" id="toast-banner">Toast Notification Placeholder</div>

  <!-- ==================== SCRIPTS ==================== -->
  <script>
    let currentTab = 'inquiries'; // or 'contacts'
    let cachedData = {
      inquiries: [],
      contacts: []
    };

    // Load data on window load
    window.addEventListener('load', () => {
      loadData();
    });

    // Fetch data from backend API
    async function loadData() {
      showLoader(true);
      try {
        // Fetch inquiries
        const resInquiries = await fetch('/api/admin/inquiries');
        const jsonInquiries = await resInquiries.json();
        
        // Fetch contacts
        const resContacts = await fetch('/api/admin/contacts');
        const jsonContacts = await resContacts.json();

        cachedData.inquiries = jsonInquiries.success ? jsonInquiries.data : [];
        cachedData.contacts = jsonContacts.success ? jsonContacts.data : [];

        // Update counts
        updateBadges();
        
        // Render current active tab
        renderTable();
      } catch (err) {
        console.error('Fetch error:', err);
        showToast('Error: Unable to connect to backend server.', 'error');
      } finally {
        showLoader(false);
      }
    }

    // Switch active tab view
    function switchTab(tabName) {
      if (currentTab === tabName) return;
      currentTab = tabName;
      
      // Update active button state
      document.getElementById('tab-inquiries').classList.toggle('active', currentTab === 'inquiries');
      document.getElementById('tab-contacts').classList.toggle('active', currentTab === 'contacts');
      
      renderTable();
    }

    // Update numbers badge in header and buttons
    function updateBadges() {
      const inquiresCount = cachedData.inquiries.length;
      const contactsCount = cachedData.contacts.length;

      document.getElementById('stat-inquiries-count').innerText = inquiresCount;
      document.getElementById('stat-contacts-count').innerText = contactsCount;

      document.getElementById('badge-inquiries').innerText = inquiresCount;
      document.getElementById('badge-contacts').innerText = contactsCount;
    }

    // Render table rows based on cached data
    function renderTable() {
      const table = document.getElementById('data-table');
      const emptyView = document.getElementById('empty-view');
      const tableView = document.getElementById('table-view');
      
      const data = cachedData[currentTab];

      if (data.length === 0) {
        tableView.style.display = 'none';
        emptyView.style.display = 'block';
        return;
      }

      tableView.style.display = 'block';
      emptyView.style.display = 'none';

      let html = '';

      if (currentTab === 'inquiries') {
        html = `
          <thead>
            <tr>
              <th style="width: 20%;">Student Name</th>
              <th style="width: 20%;">Contact Info</th>
              <th style="width: 15%;">Department</th>
              <th style="width: 33%;">Message / Query</th>
              <th style="width: 12%; text-align: center;">Actions</th>
            </tr>
          </thead>
          <tbody>
        `;
        
        data.forEach(item => {
          const date = new Date(item.createdAt).toLocaleDateString('en-US', {
            month: 'short',
            day: 'numeric',
            year: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
          });
          html += `
            <tr id="row-${item._id}">
              <td>
                <strong style="color: var(--color-navy); font-weight: 600;">${escapeHTML(item.name)}</strong>
                <div class="row-date">${date}</div>
              </td>
              <td>
                <div>✉️ <a href="mailto:${item.email}" style="color: var(--color-navy-light); text-decoration: none;">${escapeHTML(item.email)}</a></div>
                <div style="margin-top: 4px;">💬 ${escapeHTML(item.whatsapp)}</div>
              </td>
              <td>
                <span class="row-department">${escapeHTML(item.department)}</span>
              </td>
              <td>
                <div class="row-message">${escapeHTML(item.message)}</div>
              </td>
              <td style="text-align: center; vertical-align: middle;">
                <button class="btn-delete" onclick="deleteEntry('${item._id}')">Delete</button>
              </td>
            </tr>
          `;
        });
      } else {
        html = `
          <thead>
            <tr>
              <th style="width: 20%;">Sender Name</th>
              <th style="width: 25%;">Contact Info</th>
              <th style="width: 43%;">Message Text</th>
              <th style="width: 12%; text-align: center;">Actions</th>
            </tr>
          </thead>
          <tbody>
        `;
        
        data.forEach(item => {
          const date = new Date(item.createdAt).toLocaleDateString('en-US', {
            month: 'short',
            day: 'numeric',
            year: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
          });
          html += `
            <tr id="row-${item._id}">
              <td>
                <strong style="color: var(--color-navy); font-weight: 600;">${escapeHTML(item.name)}</strong>
                <div class="row-date">${date}</div>
              </td>
              <td>
                <div>✉️ <a href="mailto:${item.email}" style="color: var(--color-navy-light); text-decoration: none;">${escapeHTML(item.email)}</a></div>
                <div style="margin-top: 4px;">📞 ${escapeHTML(item.phone)}</div>
              </td>
              <td>
                <div class="row-message">${escapeHTML(item.message)}</div>
              </td>
              <td style="text-align: center; vertical-align: middle;">
                <button class="btn-delete" onclick="deleteEntry('${item._id}')">Delete</button>
              </td>
            </tr>
          `;
        });
      }

      html += '</tbody>';
      table.innerHTML = html;
    }

    // Delete single entry from DB
    async function deleteEntry(id) {
      if (!confirm('Are you sure you want to delete this submission? This action cannot be undone.')) {
        return;
      }

      try {
        const endpoint = currentTab === 'inquiries' ? `/api/admin/inquiries/${id}` : `/api/admin/contacts/${id}`;
        const res = await fetch(endpoint, {
          method: 'DELETE'
        });
        const json = await res.json();

        if (json.success) {
          showToast('Record deleted successfully.', 'success');
          
          // Animate row removal in UI
          const row = document.getElementById(`row-${id}`);
          if (row) {
            row.style.transition = 'all 0.3s ease';
            row.style.opacity = '0';
            row.style.transform = 'translateX(-20px)';
            setTimeout(() => {
              // Update local cache array
              cachedData[currentTab] = cachedData[currentTab].filter(item => item._id !== id);
              updateBadges();
              renderTable();
            }, 300);
          }
        } else {
          showToast(`Error: ${json.error}`, 'error');
        }
      } catch (err) {
        console.error('Delete error:', err);
        showToast('Error: Unable to process delete operation.', 'error');
      }
    }

    // Helper: Show/hide spinner
    function showLoader(visible) {
      document.getElementById('loader').style.display = visible ? 'flex' : 'none';
    }

    // Helper: Escape tags for security
    function escapeHTML(str) {
      if (!str) return '';
      return str.replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
    }

    // Show custom toast alert
    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast-banner');
      toast.innerText = message;
      toast.className = 'toast show';
      toast.classList.toggle('toast-success', type === 'success');
      toast.classList.toggle('toast-error', type === 'error');

      setTimeout(() => {
        toast.className = 'toast';
      }, 3500);
    }

    // Export current tab data to CSV
    function exportCSV() {
      const data = cachedData[currentTab];
      if (data.length === 0) {
        showToast('No records available to export.', 'error');
        return;
      }

      let csvContent = "data:text/csv;charset=utf-8,";
      
      if (currentTab === 'inquiries') {
        // Headers
        csvContent += "ID,Full Name,Email,WhatsApp Number,Interested Department,Message/Query,DateSubmitted\n";
        // Rows
        data.forEach(item => {
          const row = [
            item._id,
            `"${item.name.replace(/"/g, '""')}"`,
            `"${item.email.replace(/"/g, '""')}"`,
            `"${item.whatsapp.replace(/"/g, '""')}"`,
            `"${item.department.replace(/"/g, '""')}"`,
            `"${item.message.replace(/"/g, '""')}"`,
            `"${new Date(item.createdAt).toISOString()}"`
          ].join(",");
          csvContent += row + "\n";
        });
      } else {
        // Headers
        csvContent += "ID,Full Name,Email,Phone Number,Message Text,DateSubmitted\n";
        // Rows
        data.forEach(item => {
          const row = [
            item._id,
            `"${item.name.replace(/"/g, '""')}"`,
            `"${item.email.replace(/"/g, '""')}"`,
            `"${item.phone.replace(/"/g, '""')}"`,
            `"${item.message.replace(/"/g, '""')}"`,
            `"${new Date(item.createdAt).toISOString()}"`
          ].join(",");
          csvContent += row + "\n";
        });
      }

      const encodedUri = encodeURI(csvContent);
      const link = document.createElement("a");
      link.setAttribute("href", encodedUri);
      
      const fileName = currentTab === 'inquiries' ? 'sct_internship_inquiries.csv' : 'sct_contact_messages.csv';
      link.setAttribute("download", fileName);
      
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      showToast('CSV report generated and downloaded.', 'success');
    }
  </script>
</body>
</html>
